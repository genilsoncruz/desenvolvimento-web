<!DOCTYPE html> <!-- Declaração do tipo de documento HTML5 -->
<html lang="pt-br"> <!-- Elemento raiz, idioma português brasileiro -->
    <head> <!-- Cabeçalho da página -->
        <meta charset="UTF-8"> <!-- Codificação UTF-8 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Viewport para dispositivos móveis -->
        <title>Netflix</title> <!-- Título da página -->
        <link rel="stylesheet" href="style.css"> <!-- Link para CSS -->
        <script src="script.js"></script> <!-- Link para JS -->
    </head>

    <body> <!-- Corpo da página -->
        <main> <!-- Conteúdo principal -->
            <header> <!-- Cabeçalho do conteúdo -->
                <h1>Quem está assistindo?</h1> <!-- Título principal -->
            </header>
            <section class="container" aria-label="Perfis de Usuário"> <!-- Seção dos perfis -->
                <article class="profile"> <!-- Primeiro perfil -->
                    <figure> <!-- Figura com imagem e legenda -->
                        <img src="/assets/profile1.jpg" alt="Foto do Perfil 1"> <!-- Imagem do perfil 1 -->
                        <figcaption>Perfil 1</figcaption> <!-- Legenda -->
                    </figure>
                </article>
                <article class="profile"> <!-- Segundo perfil -->
                    <figure>
                        <img src="/assets/profile2.jpg" alt="Foto do Perfil 2"> <!-- Imagem do perfil 2 -->
                        <figcaption>Perfil 2</figcaption> <!-- Legenda -->
                    </figure>
                </article>
                <article class="profile"> <!-- Terceiro perfil -->
                    <figure>
                        <img src="/assets/profile3.jpg" alt="Foto do Perfil 3"> <!-- Imagem do perfil 3 -->
                        <figcaption>Perfil 3</figcaption> <!-- Legenda -->
                    </figure>
                </article>
            </section>
        </main>
    </body>
</html>
